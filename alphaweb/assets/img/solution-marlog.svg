<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-label="MarLog Centralized Log Management icon">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="80" cy="80" r="68" fill="#07182e" stroke="#35d7ff" stroke-width="2" opacity=".9"/>
  <g fill="none" stroke="#39dcff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Terminal/Console Window -->
    <rect x="40" y="42" width="80" height="68" rx="6"/>
    <!-- Terminal Title Bar Line -->
    <path d="M40 60h80"/>
    <!-- Console dots (minimize, maximize, close buttons) -->
    <circle cx="50" cy="51" r="1" fill="#39dcff" stroke="none"/>
    <circle cx="56" cy="51" r="1" fill="#39dcff" stroke="none"/>
    <circle cx="62" cy="51" r="1" fill="#39dcff" stroke="none"/>
    <!-- Terminal Prompt & Lines -->
    <path d="M50 74l4 4-4 4M62 82h18M50 96h36"/>
    <!-- Centralizing arrows or Magnifying glass -->
    <circle cx="110" cy="110" r="16"/>
    <path d="M121 121l13 13"/>
  </g>
</svg>
